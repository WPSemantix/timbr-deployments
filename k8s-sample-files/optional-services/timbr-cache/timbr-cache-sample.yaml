kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: timbr-cache-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Gi
  volumeMode: Filesystem
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: timbr-cache
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timbr-cache
  template:
    metadata:
      labels:
        app: timbr-cache
        component: timbr-cache
    spec:
      volumes:
        - name: timbr-cache-data-volume
          persistentVolumeClaim:
            claimName: timbr-cache-data
        - name: host-sys
          hostPath:
            path: /sys
            type: ''
      initContainers:
        - name: timbr-cache-disable-thp
          image: timbr.azurecr.io/timbr-cache:latest
          command:
            - sh
            - '-c'
            - echo madvise >/host-sys/kernel/mm/transparent_hugepage/enabled
          volumeMounts:
            - name: host-sys
              mountPath: /host-sys
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      containers:
        - name: timbr-cache
          image: timbr.azurecr.io/timbr-cache:latest
          ports:
            - hostPort: 8123
              containerPort: 8123
              protocol: TCP
          volumeMounts:
            - name: timbr-cache-data-volume
              mountPath: /var/lib/clickhouse/
          imagePullPolicy: Always
          resources:
            limits:
              memory: 4Gi
            requests:
              memory: 1Gi
      restartPolicy: Always
      terminationGracePeriodSeconds: 40
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
        - name: timbr-registry-cred
      schedulerName: default-scheduler
  strategy:
    type: Recreate
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 120
---
kind: Service
apiVersion: v1
metadata:
  name: timbr-cache
  namespace: default
spec:
  ports:
    - name: timbr-cache
      protocol: TCP
      port: 8123
      targetPort: 8123
  selector:
    component: timbr-cache
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster