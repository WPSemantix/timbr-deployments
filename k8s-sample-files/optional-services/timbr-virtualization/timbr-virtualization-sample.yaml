apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: timbr-virtualization-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 30Gi
---
kind: Deployment
apiVersion: apps/v1
metadata:
  name: timbr-virtualization
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timbr-virtualization
  template:
    metadata:
      labels:
        app: timbr-virtualization
    spec:
      volumes:
        - name: timbr-virtualization-data-volume
          persistentVolumeClaim:
            claimName: timbr-virtualization-data
      containers:
        - name: timbr-virtualization
          image: 'timbr.azurecr.io/timbr-virtualization-v2:latest'
          ports:
            - containerPort: 10000
              protocol: TCP
          env:
            - name: TIMBR_DB_JDBC
              value: jdbc:mysql://timbr-mysql:3306/timbr_metastore?useSSL=false
            - name: TIMBR_DB_JDBC_DRIVER
              value: com.mysql.jdbc.Driver
            - name: TIMBR_DB_USER
              value: db_user
            - name: TIMBR_DB_PASSWORD
              value: db_pass
          resources:
            limits:
              memory: 2Gi
            requests:
              memory: 500Mi
          volumeMounts:
            - name: timbr-virtualization-data-volume
              mountPath: /data/
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      imagePullSecrets:
        - name: timbr-registry-cred
      restartPolicy: Always
      terminationGracePeriodSeconds: 35
---
kind: Service
apiVersion: v1
metadata:
  name: timbr-virtualization
  namespace: default
spec:
  type: ClusterIP
  sessionAffinity: None
  internalTrafficPolicy: Cluster
  ipFamilyPolicy: SingleStack
  ipFamilies:
    - IPv4
  ports:
    - name: timbr-virtualization
      protocol: TCP
      port: 10000
      targetPort: 10000
  selector:
    app: timbr-virtualization