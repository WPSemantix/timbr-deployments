kind: Deployment
apiVersion: apps/v1
metadata:
  name: timbr-scheduler
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timbr-scheduler
  template:
    metadata:
      labels:
        app: timbr-scheduler
    spec:
      containers:
        - name: timbr
          image: timbr.azurecr.io/timbr-scheduler:latest
          env:
            - name: TIMBR_DB_HOST
              value: timbr-mysql
            - name: TIMBR_DB_SSL
              value: "false"
            - name: TIMBR_DB_USER
              value: db_user
            - name: TIMBR_DB_PASSWORD
              value: db_pass
            - name: PYTHONUNBUFFERED
              value: '1'
            - name: TIMBR_DB_NAME
              value: timbr_server
            - name: THRIFT_HOST
              value: timbr-server
          resources:
            limits:
              memory: 200Mi
            requests:
              memory: 50Mi
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
      restartPolicy: Always
      terminationGracePeriodSeconds: 30
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
        - name: timbr-registry-cred
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600