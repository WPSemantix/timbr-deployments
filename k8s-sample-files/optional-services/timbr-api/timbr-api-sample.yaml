kind: Deployment
apiVersion: apps/v1
metadata:
  name: timbr-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: timbr-api
  template:
    metadata:
      labels:
        app: timbr-api
    spec:
      containers:
        - name: timbr-api
          image: timbr.azurecr.io/timbr-api:latest
          ports:
            - containerPort: 9000
              protocol: TCP
          env:
            - name: THRIFT_HOST
              value: timbr-server
          terminationMessagePath: /dev/termination-log
          terminationMessagePolicy: File
          imagePullPolicy: Always
          resources:
            limits:
              memory: 4Gi
            requests:
              memory: 500Mi
      restartPolicy: Always
      terminationGracePeriodSeconds: 95
      dnsPolicy: ClusterFirst
      securityContext: {}
      imagePullSecrets:
        - name: timbr-registry-cred
      schedulerName: default-scheduler
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 25%
      maxSurge: 25%
  revisionHistoryLimit: 10
  progressDeadlineSeconds: 600
---
kind: Service
apiVersion: v1
metadata:
  name: timbr-api
  namespace: default
spec:
  ports:
    - name: timbr-api
      protocol: TCP
      port: 9000
      targetPort: 9000
  selector:
    app: timbr-api
  type: ClusterIP
  sessionAffinity: None
  ipFamilies:
    - IPv4
  ipFamilyPolicy: SingleStack
  internalTrafficPolicy: Cluster