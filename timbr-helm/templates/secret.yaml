{{- if and .Values.secrets.create (not .Values.secrets.existingSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: timbr-secrets
  namespace: {{ .Values.namespaceOverride | default .Release.Namespace }}
  labels:
{{ include "timbr.labels" . | indent 4 }}
type: Opaque
data:
  mysqlRootPassword: {{ .Values.secrets.data.mysqlRootPassword | b64enc | quote }}
  llmApiKey: {{ .Values.secrets.data.llmApiKey | default "" | b64enc | quote }}
  oauthSecret: {{ .Values.secrets.data.oauthSecret | default "" | b64enc | quote }}
  azureClientSecret: {{ .Values.secrets.data.azureClientSecret | default "" | b64enc | quote }}
{{- end }}
